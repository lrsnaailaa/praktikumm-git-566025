<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Website Sederhana</title>

    <style>
        body {
            background-color: #f0f8ff;
            text-align: center;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        header {
            background-color: #3498db;
            color: white;
            padding: 20px;
        }

        main {
            padding: 30px;
        }

        h1 {
            margin: 0;
        }

        p {
            color: #555;
        }

        button {
            padding: 10px 20px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #27ae60;
        }

        footer {
            margin-top: 40px;
            background-color: #2c3e50;
            color: white;
            padding: 15px;
        }
    </style>

</head>
<body>

    <header>
        <h1>Halo, Selamat Datang 👋</h1>
    </header>

    <main>
        <p>Ini adalah website sederhana untuk tugas Git & GitHub.</p>
        <p>Belajar commit, branch, dan lainnya jadi lebih mudah 😄</p>

        <button>Klik Saya</button>
    </main>

    <footer>
        <p>© 2026 - Website Saya</p>
    </footer>

</body>
</html>
